name: tube_london
description: "Tube — London Transit. Plan and navigate London transit routes with AR turn-by-turn navigation."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Networking
  dio: ^5.7.0

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Location + sensors
  geolocator: ^13.0.2
  flutter_compass: ^0.8.1
  sensors_plus: ^6.1.1
  permission_handler: ^11.3.1

  # AR / camera
  camera: ^0.11.0+2

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI / motion / type
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
